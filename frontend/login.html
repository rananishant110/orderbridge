<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OrderBridge — Sign in</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
            mono: ['ui-monospace', 'SFMono-Regular', 'monospace'],
          },
          colors: {
            brand:     '#18E299',
            'brand-lt':'#d4fae8',
            'brand-dk':'#0fa76e',
            near:      '#0d0d0d',
            g700:      '#333333',
            g500:      '#666666',
            g400:      '#888888',
            g200:      '#e5e5e5',
            g100:      '#f5f5f5',
            g50:       '#fafafa',
            ob_danger: '#d45656',
          },
          keyframes: {
            'fade-up': { '0%': { opacity: 0, transform: 'translateY(8px)' }, '100%': { opacity: 1, transform: 'translateY(0)' } },
          },
          animation: { 'fade-up': 'fade-up .35s ease-out both' },
        }
      }
    }
  </script>

  <style>
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
    ::selection { background: rgba(24,226,153,0.2); }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin .7s linear infinite; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>

<body class="font-sans bg-white text-near antialiased min-h-screen flex items-center justify-center relative overflow-hidden">

  <!-- Atmospheric gradient -->
  <div class="pointer-events-none fixed inset-0"
       style="background: radial-gradient(ellipse 90% 60% at 50% -5%, rgba(24,226,153,0.10), transparent 65%);"></div>

  <!-- Subtle grid texture -->
  <div class="pointer-events-none fixed inset-0 opacity-[0.025]"
       style="background-image: linear-gradient(rgba(0,0,0,1) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,1) 1px, transparent 1px);
              background-size: 40px 40px;"></div>

  <main class="relative z-10 w-full max-w-[400px] px-5 py-12 animate-fade-up">

    <!-- Logo -->
    <div class="flex flex-col items-center mb-10">
      <div class="w-12 h-12 rounded-xl bg-brand flex items-center justify-center mb-5
                  shadow-[0_8px_24px_-8px_rgba(24,226,153,0.45)]">
        <svg viewBox="0 0 24 24" class="w-6 h-6 text-near" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <path d="M4 17c3-2 5-2 8 0s5 2 8 0"/>
          <path d="M4 12c3-2 5-2 8 0s5 2 8 0"/>
          <path d="M4 7c3-2 5-2 8 0s5 2 8 0"/>
        </svg>
      </div>
      <h1 class="text-[1.75rem] font-semibold tracking-[-0.5px] leading-none">OrderBridge</h1>
      <p class="mt-2 font-mono text-[11px] uppercase tracking-[0.55px] text-g400">
        OneStop → GrainMarket
      </p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl border border-black/[0.06] shadow-[rgba(0,0,0,0.06)_0px_4px_24px]">

      <div class="px-8 py-8">
        <p class="font-mono text-[11px] uppercase tracking-[0.55px] text-g400 mb-6">Staff access</p>

        <form id="login-form" novalidate class="space-y-4">

          <!-- Username -->
          <div>
            <label for="username" class="block text-[12px] font-medium text-g500 mb-1.5">
              Username
            </label>
            <input id="username" type="text" autocomplete="username" spellcheck="false"
                   placeholder="onestop"
                   class="w-full px-4 py-2.5 rounded-full border border-black/[0.08]
                          text-[14px] font-medium text-near placeholder:text-g400
                          focus:outline-none focus:border-brand focus:ring-2 focus:ring-brand/15
                          transition-colors bg-white" />
          </div>

          <!-- Password -->
          <div>
            <label for="password" class="block text-[12px] font-medium text-g500 mb-1.5">
              Password
            </label>
            <input id="password" type="password" autocomplete="current-password"
                   placeholder="••••••••"
                   class="w-full px-4 py-2.5 rounded-full border border-black/[0.08]
                          text-[14px] font-medium text-near placeholder:text-g400
                          focus:outline-none focus:border-brand focus:ring-2 focus:ring-brand/15
                          transition-colors bg-white" />
          </div>

          <!-- Error -->
          <div id="error-msg"
               class="hidden items-center gap-2.5 rounded-xl border border-ob_danger/20 bg-ob_danger/[0.04] px-4 py-3">
            <svg class="w-3.5 h-3.5 shrink-0 text-ob_danger" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <p id="error-text" class="text-[12px] font-medium text-ob_danger">Invalid credentials — try again.</p>
          </div>

          <!-- Submit -->
          <div class="pt-1">
            <button type="submit" id="submit-btn"
                    class="w-full inline-flex items-center justify-center gap-2
                           px-6 py-2.5 rounded-full
                           bg-near text-white text-[14px] font-medium
                           shadow-[rgba(0,0,0,0.06)_0px_1px_2px]
                           hover:opacity-90 active:opacity-80
                           disabled:opacity-50 disabled:cursor-not-allowed
                           transition-opacity cursor-pointer">
              <svg id="btn-icon" class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                <polyline points="10 17 15 12 10 7"/>
                <line x1="15" y1="12" x2="3" y2="12"/>
              </svg>
              <svg id="btn-spinner" class="w-4 h-4 shrink-0 hidden spinner" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" stroke-linecap="round"/>
              </svg>
              <span id="btn-text">Sign in</span>
            </button>
          </div>
        </form>
      </div>

      <!-- Footer strip -->
      <div class="border-t border-black/[0.05] px-8 py-3 flex items-center justify-between">
        <span class="font-mono text-[10px] uppercase tracking-[0.5px] text-g400">Internal tool</span>
        <span class="font-mono text-[10px] uppercase tracking-[0.5px] text-g400">OneStop Distribution</span>
      </div>
    </div>

  </main>

  <script>
    // ── If already authenticated, skip login ──
    (async () => {
      try {
        const r = await fetch('/api/me');
        if (r.ok) window.location.href = '/';
      } catch {}
    })();

    // ── Form ──
    const form    = document.getElementById('login-form');
    const errEl   = document.getElementById('error-msg');
    const errText = document.getElementById('error-text');
    const btn     = document.getElementById('submit-btn');
    const btnText = document.getElementById('btn-text');
    const btnIcon = document.getElementById('btn-icon');
    const spinner = document.getElementById('btn-spinner');

    function setLoading(on) {
      btn.disabled = on;
      btnText.textContent = on ? 'Signing in…' : 'Sign in';
      btnIcon.classList.toggle('hidden', on);
      spinner.classList.toggle('hidden', !on);
    }

    function showError(msg) {
      errText.textContent = msg;
      errEl.classList.remove('hidden');
      errEl.classList.add('flex');
      errEl.animate([
        { transform: 'translateX(-4px)' }, { transform: 'translateX(4px)' },
        { transform: 'translateX(-3px)' }, { transform: 'translateX(3px)' },
        { transform: 'translateX(0)' },
      ], { duration: 320, easing: 'ease-out' });
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.classList.add('hidden');
      errEl.classList.remove('flex');

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showError('Please enter both username and password.');
        return;
      }

      setLoading(true);

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });

        if (res.ok) {
          btnText.textContent = 'Welcome back…';
          setTimeout(() => { window.location.href = '/'; }, 200);
        } else if (res.status === 401) {
          showError('Invalid credentials — check your username and password.');
          setLoading(false);
        } else {
          showError(`Server error (${res.status}) — contact your administrator.`);
          setLoading(false);
        }
      } catch {
        showError('Network error — check your connection and try again.');
        setLoading(false);
      }
    });

    ['username', 'password'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => {
        errEl.classList.add('hidden');
        errEl.classList.remove('flex');
      });
    });
  </script>
</body>
</html>
