services:
  orderbridge:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
    environment:
      OB_STORAGE_DIR: /app/storage
      OB_USER: ${OB_USER:-onestop}
      OB_PASS: ${OB_PASS:-changeme}
      FRESHBOOKS_CLIENT_ID: ${FRESHBOOKS_CLIENT_ID:-}
      FRESHBOOKS_CLIENT_SECRET: ${FRESHBOOKS_CLIENT_SECRET:-}
      FRESHBOOKS_REDIRECT_URI: ${FRESHBOOKS_REDIRECT_URI:-http://localhost:8000/api/freshbooks/callback}
      FRESHBOOKS_ACCOUNT_ID: ${FRESHBOOKS_ACCOUNT_ID:-61wqkw}
      FRESHBOOKS_CUSTOMER_ID: ${FRESHBOOKS_CUSTOMER_ID:-151069}
